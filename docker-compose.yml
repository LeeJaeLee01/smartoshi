services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    environment:
      PORT: "3030"
      RUST_LOG: info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser-accessible API URL — change to your server IP/domain before deploy
        REACT_APP_API_URL: http://localhost:3030
    ports:
      - "8080:3000"
    depends_on:
      - backend
    restart: unless-stopped
